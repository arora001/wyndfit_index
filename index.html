<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wyndfit | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #151515;
        --accent: #452168;
        --text-main: #ffffff;
        --text-muted: #a3a3a3;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .bg-image {
        position: fixed;
        inset: 0;
        opacity: 0.18;
        background-image: url("assets/background.jpg");
        background-size: cover;
        background-position: center;
        mix-blend-mode: lighten;
        pointer-events: none;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at top left,
          rgba(69, 33, 104, 0.6),
          transparent 55%
        );
        pointer-events: none;
      }

      .content {
        position: relative;
        max-width: 620px;
        width: 100%;
        padding: 40px 32px 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        overflow: hidden;
        background: #151515;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .brand-name {
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      h1 {
        font-size: 1.9rem;
        font-weight: 500;
        letter-spacing: -0.04em;
      }

      h1 span {
        color: var(--accent);
      }

      .subtitle {
        margin-top: 6px;
        font-size: 0.9rem;
        color: var(--text-muted);
        max-width: 360px;
        line-height: 1.6;
      }

      .cta {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .cta-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-muted);
      }

      /* Flex layout for button + QR code */
      .cta-action-group {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .cta-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cta-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.86rem;
        gap: 8px;
        width: fit-content;
      }

      .cta-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background-color: var(--accent);
      }

      /* QR Code styling */
      .qr-wrapper {
        width: 80px;
        height: 80px;
        background-color: #ffffff; /* White bg ensures it scans properly */
        border-radius: 8px;
        padding: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .qr-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .whatsapp-link {
        font-size: 0.78rem;
        color: var(--text-muted);
        word-break: break-all;
      }

      .whatsapp-link a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer {
        margin-top: 28px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
        font-size: 0.76rem;
        color: var(--text-muted);
      }

      .socials {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .socials span {
        opacity: 0.85;
      }

      .social-links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .social-links a {
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.8rem;
        opacity: 0.7;
        transition: opacity 0.2s ease;
      }

      .social-links a:hover {
        opacity: 1;
      }

      @media (max-width: 600px) {
        .content {
          padding: 24px 20px 22px;
        }

        h1 {
          font-size: 1.6rem;
        }
        
        .cta-action-group {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="bg-image"></div>
      <div class="overlay"></div>

      <div class="content">
        <header class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Wyndfit logo" />
          </div>
          <span class="brand-name">WYNDFIT</span>
        </header>

        <section>
          <h1>Coming soon<span>.</span></h1>
          <p class="subtitle">
            Stay in the Game. Wyndfit is launching soon.
          </p>

          <div class="cta">
            <span class="cta-label">Join the community now</span>
            
            <div class="cta-action-group">
              <div class="cta-buttons">
                <a
                  href="https://chat.whatsapp.com/KliR3Ot2sDdGndz5E7MgGy?mode=gi_t"
                  class="cta-button"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="cta-dot"></span>
                  <span>WhatsApp group chat</span>
                </a>
                <p class="whatsapp-link">
                  Or open directly:<br>
                  <a
                    href="https://chat.whatsapp.com/KliR3Ot2sDdGndz5E7MgGy?mode=gi_t"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    https://chat.whatsapp.com/KliR3Ot2sDdGndz5E7MgGy
                  </a>
                </p>
              </div>

              <div class="qr-wrapper">
                <img src="assets/image-removebg-preview.png" alt="Scan to join WhatsApp" />
              </div>
            </div>
          </div>
        </section>

        <footer class="footer">
          <span>© <span id="year"></span> Wyndfit</span>
          <div class="socials">
            <span>Links:</span>
            <div class="social-links">
              <a href="mailto:admin@wyndfit.com" aria-label="Contact Wyndfit">Contact Us</a>
              <a href="https://www.facebook.com/profile.php?id=61585209393367&mibextid=wwXIfr&rdid=xvvYYEDa4cnAgef1&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F17wjNehfc2%2F%3Fmibextid%3DwwXIfr%26wa_status_inline%3Dtrue%26ref%3D1" target="_blank" rel="noopener noreferrer" aria-label="Wyndfit on Facebook">Facebook</a>
              <a href="https://www.linkedin.com/company/wyndfit" target="_blank" rel="noopener noreferrer" aria-label="Wyndfit on LinkedIn">LinkedIn</a>
            </div>
          </div>
        </footer>
      </div>
    </main>

    <script>
      document.getElementById("year").textContent =
        new Date().getFullYear().toString();
    </script>
  </body>
</html>
