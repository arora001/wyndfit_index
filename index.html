<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wyndfit | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #151515;
        --accent: #452168;
        --text-main: #ffffff;
        --text-muted: #a3a3a3;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      main {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .bg-image {
        position: fixed;
        inset: 0;
        opacity: 0.18;
        background-image: url("assets/background.jpg");
        background-size: cover;
        background-position: center;
        mix-blend-mode: lighten;
        pointer-events: none;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at top left,
          rgba(69, 33, 104, 0.6),
          transparent 55%
        );
        pointer-events: none;
      }

      .content {
        position: relative;
        max-width: 620px;
        width: 100%;
        padding: 40px 32px 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        overflow: hidden;
        background: #151515;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .brand-name {
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      h1 {
        font-size: 1.9rem;
        font-weight: 500;
        letter-spacing: -0.04em;
      }

      h1 span {
        color: var(--accent);
      }

      .subtitle {
        margin-top: 6px;
        font-size: 0.9rem;
        color: var(--text-muted);
        max-width: 360px;
        line-height: 1.6;
      }

      .cta {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .cta-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--text-muted);
      }

      .cta-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.86rem;
        gap: 8px;
      }

      .cta-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background-color: var(--accent);
      }

      .whatsapp-link {
        font-size: 0.78rem;
        color: var(--text-muted);
        word-break: break-all;
      }

      .whatsapp-link a {
        color: var(--accent);
        text-decoration: none;
      }

      .footer {
        margin-top: 28px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
        font-size: 0.76rem;
        color: var(--text-muted);
      }

      .socials {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .socials span {
        opacity: 0.85;
      }

      .social-links {
        display: flex;
        gap: 8px;
      }

      .social-links a {
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.8rem;
        opacity: 0.7;
      }

      @media (max-width: 600px) {
        .content {
          padding: 24px 20px 22px;
        }

        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="bg-image"></div>
      <div class="overlay"></div>

      <div class="content">
        <header class="brand">
          <div class="brand-logo">
            <img src="assets/logo.png" alt="Wyndfit logo" />
          </div>
          <span class="brand-name">WYNDFIT</span>
        </header>

        <section>
          <h1>Coming soon<span>.</span></h1>
          <p class="subtitle">
            A quieter, more intentional way to stay consistent with your training. Wyndfit is
            launching soon.
          </p>

          <div class="cta">
            <span class="cta-label">Join the community now</span>
            <a
              href="https://chat.whatsapp.com/your-group-link"
              class="cta-button"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="cta-dot"></span>
              <span>WhatsApp group chat</span>
            </a>
            <p class="whatsapp-link">
              Or open directly:
              <a
                href="https://chat.whatsapp.com/your-group-link"
                target="_blank"
                rel="noopener noreferrer"
              >
                https://chat.whatsapp.com/your-group-link
              </a>
            </p>
          </div>
        </section>

        <footer class="footer">
          <span>© <span id="year"></span> Wyndfit</span>
          <div class="socials">
            <span>Links:</span>
            <div class="social-links">
              <!-- Replace `#` with real URLs -->
              <a href="#" aria-label="Wyndfit on Facebook">Facebook</a>
              <a href="#" aria-label="Wyndfit on LinkedIn">LinkedIn</a>
            </div>
          </div>
        </footer>
      </div>
    </main>

    <script>
      document.getElementById("year").textContent =
        new Date().getFullYear().toString();
    </script>
  </body>
</html>
